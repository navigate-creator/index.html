<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3F; --gold: #F5C518; --border: #E2E8F0; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #FDFDFD; color: var(--navy); margin: 0; display: flex; height: 100vh; }
        
        .queue { width: 300px; border-right: 1.5px solid var(--border); background: white; overflow-y: auto; }
        .q-item { padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .q-item:hover { background: var(--gold-light); }
        .q-item.active { border-left: 4px solid var(--gold); background: var(--gold-light); }

        .workspace { flex-1; padding: 60px; overflow-y: auto; }
        .btn-pass { background: var(--gold); color: var(--navy); padding: 14px 40px; font-weight: 900; text-transform: uppercase; font-size: 11px; border: none; cursor: pointer; }
        .btn-fail { background: var(--red); color: white; padding: 14px 40px; font-weight: 900; text-transform: uppercase; font-size: 11px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="queue">
        <div class="p-6 border-b-2 border-gold uppercase"><span style="font-size:10px; font-weight:900; letter-spacing:2px;">Veto Queue</span></div>
        <div class="q-item active">
            <p style="font-size:9px; font-weight:800; color:var(--gold);">MC-104-229</p>
            <p style="font-size:11px; font-weight:900; text-transform:uppercase; margin-top:2px;">Alpha Global Ltd</p>
        </div>
    </aside>

    <main class="workspace">
        <header class="mb-12">
            <span style="font-size:10px; font-weight:900; color:var(--gold); text-transform:uppercase; letter-spacing:4px;">Architect Verdict</span>
            <h1 style="font-family:Montserrat; font-weight:900; font-size:32px; text-transform:uppercase; letter-spacing:-1.5px;">Adjudication Terminal</h1>
        </header>

        <div class="grid grid-cols-1 gap-8 max-w-2xl">
            <div style="background:white; border:1px solid var(--border); border-top:4px solid var(--navy); padding:30px;">
                <p style="font-size:9px; font-weight:900; opacity:0.4; text-transform:uppercase; margin-bottom:10px;">Entity Details</p>
                <h3 style="font-size:18px; font-weight:900; text-transform:uppercase;">Alpha Global Ltd</h3>
                <p style="font-size:11px; font-weight:600; color:var(--text-grey); margin-top:5px;">ID Reference: MC-104-229 | Analyst: J. Doe</p>
            </div>

            <textarea placeholder="INPUT TECHNICAL RATIONALE..." style="width:100%; height:150px; padding:20px; border:1.5px solid var(--border); font-size:12px; font-weight:600; outline:none; focus:border-gold"></textarea>

            <div class="flex gap-4">
                <button class="btn-pass" onclick="alert('AUDIT PASSED')">Issue Pass Audit</button>
                <button class="btn-fail" onclick="alert('AUDIT FAILED - SYSTEM LOCKED')">Issue Fail & Lock</button>
            </div>
        </div>
    </main>
</body>
</html>
