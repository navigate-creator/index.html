   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC™ MASTER OS | Merrick Compliance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3F; --gold: #F5C518; --border: #E2E8F0; --bg: #FDFDFD; }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); margin: 0; overflow: hidden; display: flex; }
        
        .sidebar { width: 240px; height: 100vh; background: #081426; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; shrink-0; }
        .nav-item { 
            padding: 14px 24px; font-size: 9px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1.5px; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s;
            border-left: 3px solid transparent;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: var(--gold); background: rgba(245, 197, 24, 0.05); border-left-color: var(--gold); }
        
        .viewport-container { flex-1; background: var(--bg); display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        .status-bar { 
            background: white; border-top: 1px solid var(--border); padding: 10px 24px; 
            font-family: 'JetBrains Mono'; font-size: 9px; color: var(--navy); font-weight: 700;
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="p-8 border-b border-white/10 mb-4">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-sm">
                    <svg viewBox="0 0 100 100" class="w-5 h-5" fill="#0B1F3F"><rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/></svg>
                </div>
                <span class="text-white font-black text-xs tracking-tighter uppercase font-montserrat">Merrick Compliance</span>
            </div>
        </div>
        <div class="flex-1">
            <div onclick="load('dashboard', this)" class="nav-item active">01 Governance</div>
            <div onclick="load('prep', this)" class="nav-item">02 Analyst Station</div>
            <div onclick="load('veto', this)" class="nav-item">03 Veto Terminal</div>
            <div onclick="load('vault', this)" class="nav-item">04 Logic Vault</div>
        </div>
        <div class="p-6 opacity-20"><p style="font-size:7px;" class="uppercase tracking-widest text-white">Security Level: Architect</p></div>
    </nav>

    <div class="viewport-container flex-1">
        <iframe id="os-view" src="dashboard.html"></iframe>
        <footer class="status-bar flex justify-between uppercase">
            <div>Unit ID: <span id="sid" class="text-gold">MC-000-000</span></div>
            <div class="flex gap-6">
                <span id="clock">00:00:00</span>
                <span>Registry: Online</span>
            </div>
        </footer>
    </div>

    <script>
        function load(page, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('os-view').src = page + '.html';
        }

        window.onload = () => {
            let id = sessionStorage.getItem('MC_ID') || `MC-${Math.floor(Math.random()*900+100)}-${Math.floor(Math.random()*900+100)}`;
            sessionStorage.setItem('MC_ID', id);
            document.getElementById('sid').innerText = id;
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        };
    </script>
</body>
</html>
