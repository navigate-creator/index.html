<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC™ MASTER OS | MERRICK COMPLIANCE ™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3F; --gold: #F5C518; --border: rgba(255,255,255,0.1); --bg-dark: #061021; --grey-text: #9ca3af; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; overflow: hidden; display: flex; font-weight: 300; }
        
        /* SIDEBAR BRANDING (Upscaled per directive) */
        .sidebar { width: 320px; height: 100vh; background: #081426; border-right: 1px solid var(--border); display: flex; flex-direction: column; shrink-0; z-index: 50; }
        .sidebar-brand { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 50px 30px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .m-logo-large { width: 75px; height: 75px; fill: white; shrink-0; } 
        .m-name-large { font-family: 'Montserrat'; font-weight: 900; font-size: 28px; color: white; text-transform: uppercase; line-height: 1.1; letter-spacing: -1px; }
        .m-compliance-large { font-family: 'Inter'; font-weight: 300; font-size: 12px; color: var(--grey-text); text-transform: uppercase; letter-spacing: 3px; }

        .nav-item { padding: 20px 40px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.4); cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item.active { color: var(--gold); background: rgba(245, 197, 24, 0.05); border-left-color: var(--gold); }

        /* VIEWPORT & DOT GRID (image_4e9e28.png) */
        .viewport { flex: 1; height: 100vh; overflow-y: auto; background-color: #ffffff; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; color: var(--navy); position: relative; }
        .view-content { display: none; padding: 80px 40px; animation: fadeIn 0.4s ease forwards; }
        .view-content.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        /* FRAMEWORK VISUALS (EXACT MATCH) */
        .fw-container { display: flex; align-items: center; gap: 0; scale: 0.9; }
        .mc-core-box { width: 180px; height: 320px; border: 4px solid var(--gold); background: white; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05); z-index: 10; }
        
        .pillar-flow { display: flex; align-items: flex-end; gap: 8px; margin-left: -2px; }
        .pillar-node { display: flex; flex-direction: column; transition: 0.3s; cursor: pointer; }
        .pillar-node:hover { transform: translateY(-5px); }
        .p-num-box { background: var(--navy); color: white; width: 100%; padding: 12px 0; text-align: center; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; border-radius: 4px 4px 0 0; }
        .p-name-box { background: white; border: 1px solid var(--gold); padding: 10px 15px; min-width: 130px; text-align: center; font-size: 9px; font-weight: 900; text-transform: uppercase; color: var(--navy); white-space: nowrap; border-radius: 0 0 4px 4px; }

        /* LOGIC DRAWER */
        #drawer { position: fixed; right: -500px; top: 0; width: 500px; height: 100vh; background: white; border-left: 3px solid var(--gold); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 50px; overflow-y: auto; }
        #drawer.open { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(6, 16, 33, 0.8); z-index: 900; display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
    <div id="drawer"><div id="drawer-content"></div></div>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <svg viewBox="0 0 100 100" class="m-logo-large">
                <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
            </svg>
            <div class="brand-text-block">
                <span class="m-name-large">MERRICK</span>
                <span class="m-compliance-large">COMPLIANCE ™</span>
            </div>
        </div>
        <div onclick="switchView('framework', this)" class="nav-item active">01 Framework</div>
        <div onclick="switchView('prep', this)" class="nav-item">02 Analyst Prep</div>
        <div onclick="switchView('veto', this)" class="nav-item">03 Veto Terminal</div>
        <div onclick="switchView('vault', this)" class="nav-item">04 Logic Vault</div>
    </nav>

    <main class="viewport">
        <div id="view-framework" class="view-content active">
            <div class="fw-container">
                <div class="mc-core-box">
                    <svg viewBox="0 0 100 100" class="w-16 h-16 mb-6" fill="var(--navy)">
                        <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
                    </svg>
                    <span class="text-[11px] font-black tracking-[3px] text-navy uppercase">MC™ CORE</span>
                </div>
                
                <div class="pillar-flow" id="fw-flow"></div>
            </div>
        </div>

        <div id="view-prep" class="view-content">Analyst Station Blueprint Preserved.</div>
    </main>

    <script>
        const MC_LOGIC = {
            1: { title: "Risk Taxonomy", meat: "Classification is the filter for resources.", subs: ["Jurisdiction", "Business Model", "Product Exposure"] },
            2: { title: "Customer ID", meat: "Identity is the Digital Handshake.", subs: ["Liveness", "Document Auth", "Nexus"] },
            3: { title: "Diligence", meat: "The Wealth Narrative.", subs: ["UBO", "SoW", "Standing"] },
            4: { title: "Screening", meat: "Signal vs. Noise.", subs: ["PEP", "Sanction", "Media"] },
            5: { title: "Evidence", meat: "The Regulatory Black Box.", subs: ["Metadata", "Audit Trail", "Retention"] },
            6: { title: "Adjudication", meat: "Objective Science over Opinion.", subs: ["Consistency", "Conflict", "Tolerance"] },
            7: { title: "Quality", meat: "We audit ourselves first.", subs: ["Sampling", "Error Rate", "Remediation"] },
            8: { title: "Governance", meat: "Data flows up; safety flows down.", subs: ["Board Summary", "Regulatory Delta", "Escalation"] }
        };

        window.onload = () => {
            const flow = document.getElementById('fw-flow');
            Object.keys(MC_LOGIC).forEach(key => {
                flow.innerHTML += `
                    <div class="pillar-node" onclick="openPillar(${key})">
                        <div class="p-num-box">0${key}</div>
                        <div class="p-name-box">${MC_LOGIC[key].title}</div>
                    </div>
                `;
            });
        };

        function openPillar(id) {
            const data = MC_LOGIC[id];
            document.getElementById('drawer-content').innerHTML = `
                <h2 class="text-2xl font-black uppercase text-navy mb-4">${data.title}</h2>
                <p class="italic text-gray-500 mb-8">"${data.meat}"</p>
                <div class="space-y-4">
                    ${data.subs.map(s => `<div class="p-4 bg-gray-50 font-bold text-[10px] uppercase border-l-4 border-gold">${s}</div>`).join('')}
                </div>
            `;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeDrawer() { 
            document.getElementById('drawer').classList.remove('open'); 
            document.getElementById('overlay').style.display = 'none'; 
        }

        function switchView(v, el) {
            document.querySelectorAll('.view-content').forEach(c => c.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
