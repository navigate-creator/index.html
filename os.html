<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC™ MASTER OS | Merrick Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #061021; --navy-light: #0B1F3F; --gold: #F5C518; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--navy); color: white; margin: 0; overflow: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Sidebar Styling */
        .sidebar { width: 260px; height: 100vh; background: #081426; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { 
            padding: 16px 24px; font-size: 10px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.3s;
            border-left: 4px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { color: var(--gold); background: rgba(245, 197, 24, 0.05); border-left-color: var(--gold); }
        .nav-locked { opacity: 0.3; cursor: not-allowed; }

        /* Content Area */
        #os-viewport { width: 100%; height: 100%; border: none; background: white; }
        
        .status-bar { background: var(--navy-light); border-top: 1px solid var(--border); padding: 8px 24px; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--gold); }
    </style>
</head>
<body class="flex">

    <nav class="sidebar shrink-0">
        <div class="p-8 border-b border-white/10 mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-white p-1 rounded-sm">
                    <svg viewBox="0 0 100 100" class="w-6 h-6" fill="#0B1F3F"><rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/><rect x="56" y="42" width="12" height="24"/></svg>
                </div>
                <div>
                    <h1 class="font-montserrat font-black text-lg tracking-tighter leading-none">MERRICK</h1>
                    <p class="text-[8px] font-bold text-gold tracking-[0.3em] uppercase">COMPLIANCE</p>
                </div>
            </div>
        </div>

        <div class="flex-1">
            <div onclick="loadModule('prep', this)" class="nav-item active" id="nav-prep">01 Analyst Prep</div>
            <div onclick="loadModule('veto', this)" class="nav-item nav-locked" id="nav-veto">02 Veto Terminal (Locked)</div>
            <div onclick="loadModule('vault', this)" class="nav-item nav-locked" id="nav-vault">03 Logic Vault (Locked)</div>
            <div class="mt-10 px-6">
                <button onclick="requestArchitectAccess()" class="w-full border border-gold/30 text-gold py-2 text-[8px] font-black uppercase tracking-widest hover:bg-gold hover:text-navy transition-all">Unlock Architect Mode</button>
            </div>
        </div>

        <div class="p-6 border-t border-white/10 opacity-30">
            <p class="text-[7px] font-mono uppercase">Master OS v1.02</p>
            <p class="text-[7px] font-mono uppercase">Parent: Merrick Solution</p>
        </div>
    </nav>

    <div class="flex-1 flex flex-col">
        <div class="flex-1 relative">
            <iframe id="os-viewport" src="prep.html"></iframe>
        </div>

        <footer class="status-bar flex justify-between items-center">
            <div class="flex gap-6">
                <span>SESSION_ID: <span id="session-id">MC-000-000</span></span>
                <span>STATE: <span id="system-state" class="text-green-400">ACTIVE</span></span>
            </div>
            <div class="flex gap-6">
                <span id="os-time">00:00:00</span>
                <span id="os-date">2026.04.03</span>
            </div>
        </footer>
    </div>

    <script>
        const ARCHITECT_KEY = "MC8VETO";
        let isArchitect = false;

        // 1. Persist Unique ID across the entire session
        window.onload = () => {
            let sessionID = sessionStorage.getItem('MC_SESSION_ID');
            if (!sessionID) {
                const p1 = Math.floor(Math.random() * 900) + 100;
                const p2 = Math.floor(Math.random() * 900) + 100;
                sessionID = `MC-${p1}-${p2}`;
                sessionStorage.setItem('MC_SESSION_ID', sessionID);
            }
            document.getElementById('session-id').innerText = sessionID;
            updateDateTime();
        };

        // 2. Navigation Logic
        function loadModule(module, el) {
            const viewport = document.getElementById('os-viewport');
            
            if (module === 'veto' || module === 'vault') {
                if (!isArchitect) {
                    alert("ACCESS DENIED: Architect credentials required for Veto/Vault.");
                    return;
                }
            }

            // Set UI active state
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // Load file into iframe
            viewport.src = `${module}.html`;
        }

        // 3. Unlock Architect Features
        function requestArchitectAccess() {
            const key = prompt("ENTER ARCHITECT PRIVATE KEY:");
            if (key === ARCHITECT_KEY) {
                isArchitect = true;
                document.getElementById('nav-veto').classList.remove('nav-locked');
                document.getElementById('nav-veto').innerText = "02 Veto Terminal";
                document.getElementById('nav-vault').classList.remove('nav-locked');
                document.getElementById('nav-vault').innerText = "03 Logic Vault";
                alert("AUTHORITY VERIFIED: Architect Mode Active.");
            } else {
                alert("HANDSHAKE FAILED: Unauthorized Access.");
            }
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('os-time').innerText = now.toLocaleTimeString();
            document.getElementById('os-date').innerText = now.toISOString().split('T')[0].replace(/-/g, '.');
        }

        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
