<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC™ MASTER OS | MERRICK COMPLIANCE ™</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy-sidebar: #050b14; --gold: #F5C518; --navy-pillars: #0B1F3F; --dot-color: #cbd5e1; }
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* PROFESSIONAL SIDEBAR (Match image_4eb0b3.png) */
        .sidebar { width: 300px; background: var(--navy-sidebar); display: flex; flex-direction: column; shrink-0; border-right: 1px solid rgba(255,255,255,0.05); }
        .brand-container { padding: 40px 30px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-mc { width: 45px; height: 45px; fill: white; } /* Upscaled Monogram Only */
        .brand-text { display: flex; flex-direction: column; }
        .text-merrick { color: white; font-family: 'Montserrat'; font-weight: 900; font-size: 22px; letter-spacing: -0.5px; line-height: 1; }
        .text-compliance { color: #64748b; font-size: 10px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        .nav-list { flex: 1; margin-top: 20px; }
        .nav-item { padding: 20px 30px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #475569; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--gold); }
        .nav-item:hover { color: white; }

        /* VIEWPORT & DOT GRID */
        .viewport { flex: 1; position: relative; overflow-y: auto; background-image: radial-gradient(var(--dot-color) 0.8px, transparent 0.8px); background-size: 20px 20px; }
        .view-content { display: none; padding: 60px; min-height: 100vh; width: 100%; }
        .view-content.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* FRAMEWORK VISUALS (EXACT MATCH) */
        .fw-container { display: flex; align-items: center; scale: 0.85; }
        .mc-core-block { width: 160px; height: 300px; border: 3px solid var(--gold); background: white; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-right: -2px; z-index: 10; }
        .pillar-flow { display: flex; align-items: flex-end; gap: 8px; }
        .p-node { display: flex; flex-direction: column; width: 130px; }
        .p-head { background: var(--navy-pillars); color: white; padding: 12px; text-align: center; font-family: 'Montserrat'; font-weight: 900; font-size: 13px; border-radius: 4px 4px 0 0; }
        .p-body { background: white; border: 1.5px solid var(--gold); padding: 10px 5px; text-align: center; font-size: 8px; font-weight: 900; text-transform: uppercase; color: var(--navy-pillars); border-radius: 0 0 4px 4px; white-space: nowrap; }

        /* ANALYST PAGE (PRESERVED LOGIC) */
        .analyst-header { background: white; padding: 30px; border: 1px solid #e2e8f0; width: 100%; max-width: 900px; margin-bottom: 30px; border-radius: 4px; }
        .pillar-card { background: white; border: 1px solid #e2e8f0; padding: 20px; cursor: pointer; transition: 0.2s; }
        .pillar-card:hover { border-color: var(--gold); }
        .pillar-card.scored { border-left: 4px solid var(--gold); }

        /* LOGIC DRAWER (Analyst Only) */
        #drawer { position: fixed; right: -450px; top: 0; width: 450px; height: 100vh; background: white; border-left: 3px solid var(--gold); z-index: 1000; transition: 0.3s ease; padding: 40px; overflow-y: auto; }
        #drawer.open { right: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(5, 11, 20, 0.7); z-index: 900; display: none; }

        .btn-action { background: var(--navy-pillars); color: white; padding: 12px 24px; font-weight: 900; font-size: 10px; text-transform: uppercase; border-radius: 4px; }
        .sub-pill { padding: 10px; background: #f8fafc; border-radius: 4px; font-size: 10px; font-weight: 700; display: flex; gap: 10px; margin-bottom: 5px; cursor: pointer; }
        .sub-pill.checked { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

    <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
    <div id="drawer"><div id="drawer-content"></div></div>

    <nav class="sidebar">
        <div class="brand-container">
            <svg viewBox="0 0 100 100" class="logo-mc">
                <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
            </svg>
            <div class="brand-text">
                <span class="text-merrick">MERRICK</span>
                <span class="text-compliance">COMPLIANCE ™</span>
            </div>
        </div>
        <div class="nav-list">
            <div onclick="switchView('framework', this)" class="nav-item active">01 Framework</div>
            <div onclick="switchView('prep', this)" class="nav-item">02 Analyst Prep</div>
            <div onclick="switchView('veto', this)" class="nav-item">03 Veto Terminal</div>
            <div onclick="switchView('vault', this)" class="nav-item">04 Logic Vault</div>
        </div>
    </nav>

    <main class="viewport">
        <div id="view-framework" class="view-content active">
            <div class="fw-container">
                <div class="mc-core-block">
                    <svg viewBox="0 0 100 100" class="w-12 h-12 mb-4" fill="var(--navy-pillars)">
                        <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
                    </svg>
                    <span class="text-[10px] font-black tracking-[2px] text-navy-pillars">MC™ CORE</span>
                </div>
                <div class="pillar-flow" id="static-flow"></div>
            </div>
        </div>

        <div id="view-prep" class="view-content">
            <div class="analyst-header">
                <div class="grid grid-cols-2 gap-10 mb-6">
                    <input type="text" placeholder="LEGAL ENTITY NAME" class="border-b-2 p-2 text-xs font-bold outline-none uppercase">
                    <select class="border-b-2 p-2 text-xs font-bold outline-none uppercase bg-transparent">
                        <option>Low Risk</option><option>Medium Risk</option><option>High Risk</option>
                    </select>
                </div>
                <div class="flex justify-between items-center">
                    <input type="text" placeholder="ANALYST ID" class="border-b text-[10px] font-bold uppercase w-32">
                    <select id="tier-select" onchange="checkTier(this)" class="text-[10px] font-black uppercase border p-1">
                        <option value="1">Tier 1</option><option value="2">Tier 2</option><option value="3">Tier 3</option><option value="4">Tier 4</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 w-full max-w-[900px]" id="analyst-grid"></div>
            <div class="mt-8 flex gap-4 w-full max-w-[900px]">
                <button class="btn-action flex-1">Authorize Audit</button>
                <button class="btn-action flex-1 bg-white !text-navy-pillars border-2 border-navy-pillars">Escalate</button>
            </div>
        </div>
    </main>

    <script>
        const MC_DATA = {
            1: { title: "Risk Taxonomy", meat: "Classification is the filter for resources.", subs: ["Jurisdiction", "Business Model", "Product"] },
            2: { title: "Customer ID", meat: "Identity is the Digital Handshake.", subs: ["Liveness", "Document", "Nexus"] },
            3: { title: "Diligence", meat: "The Wealth Narrative.", subs: ["UBO", "SoW", "Standing"] },
            4: { title: "Screening", meat: "Signal vs. Noise.", subs: ["PEP", "Sanction", "Media"] },
            5: { title: "Evidence", meat: "The Regulatory Black Box.", subs: ["Metadata", "Audit Trail", "Retention"] },
            6: { title: "Adjudication", meat: "Objective Science over Opinion.", subs: ["Consistency", "Conflict", "Tolerance"] },
            7: { title: "Quality", meat: "Self-audit is institutional safety.", subs: ["Sampling", "Error Rate", "Remediation"] },
            8: { title: "Governance", meat: "Data flows up; safety flows down.", subs: ["Board Summary", "Regulatory Delta", "Escalation"] }
        };

        window.onload = () => {
            const flow = document.getElementById('static-flow');
            const grid = document.getElementById('analyst-grid');
            
            Object.keys(MC_DATA).forEach(key => {
                // Framework (Static)
                flow.innerHTML += `<div class="p-node"><div class="p-head">0${key}</div><div class="p-body">${MC_DATA[key].title}</div></div>`;
                // Analyst (Interactive)
                grid.innerHTML += `
                    <div class="pillar-card" id="card-${key}" onclick="openAnalystDrawer(${key})">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[8px] font-black text-gold uppercase">Pillar 0${key}</span>
                            <span id="stat-${key}" class="text-[8px] font-bold text-gray-400 uppercase">Pending</span>
                        </div>
                        <h3 class="text-[10px] font-black uppercase text-navy-pillars">${MC_DATA[key].title}</h3>
                    </div>`;
            });
        };

        function openAnalystDrawer(id) {
            const data = MC_DATA[id];
            document.getElementById('drawer-content').innerHTML = `
                <h2 class="text-xl font-black uppercase text-navy-pillars mb-2">${data.title}</h2>
                <p class="text-xs italic text-gray-500 mb-6">"${data.meat}"</p>
                <div class="space-y-2 mb-6">
                    ${data.subs.map((s, i) => `<div class="sub-pill" onclick="this.classList.toggle('checked')"><span></span>${s}</div>`).join('')}
                </div>
                <textarea class="w-full border p-3 text-xs font-bold mb-4 h-24 outline-none focus:border-gold" placeholder="COMPLIANCE RATIONALE..."></textarea>
                <div class="flex gap-2">
                    <button onclick="mark(${id}, 'PASS')" class="btn-action flex-1 bg-green-600">Pass</button>
                    <button onclick="mark(${id}, 'FAIL')" class="btn-action flex-1 bg-red-600">Fail</button>
                </div>`;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function mark(id, res) {
            document.getElementById(`card-${id}`).classList.add('scored');
            document.getElementById(`stat-${id}`).innerText = res;
            document.getElementById(`stat-${id}`).style.color = res === 'PASS' ? '#16a34a' : '#dc2626';
            closeDrawer();
        }

        function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
        
        function switchView(v, el) {
            document.querySelectorAll('.view-content').forEach(c => c.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function checkTier(s) { if(s.value === "4") alert("CRITICAL HALT INITIATED."); }
    </script>
</body>
</html>
