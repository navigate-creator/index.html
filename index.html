<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merrick Compliance | MC™ 8 Pillar Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0B1F3F;
            --gold: #F5C518;
            --border: #E2E8F0;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFD; color: var(--navy); overflow-x: hidden; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        /* DOT GRID BACKGROUND */
        .dot-grid {
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 30px 30px;
        }

        /* NAVIGATION */
        nav {
            padding: 15px 60px; display: flex; justify-content: space-between;
            align-items: center; background: white; border-bottom: 2px solid var(--gold);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .logo-group { display: flex; align-items: center; gap: 12px; }
        .logo-box { background: var(--navy); padding: 6px; border-radius: 4px; }
        .logo-text { font-family: 'Montserrat'; font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: -0.5px; }

        /* HERO SECTION */
        .hero { padding: 140px 60px 60px; text-align: center; }
        .hero h1 { font-family: 'Montserrat'; font-weight: 900; font-size: 52px; text-transform: uppercase; letter-spacing: -2px; line-height: 1; margin-bottom: 15px; }
        .hero p { font-size: 18px; color: #64748b; max-width: 700px; margin: 0 auto 30px; font-weight: 500; }

        /* ORBIT LINE DIAGRAM */
        .orbit-wrapper {
            position: relative; width: 650px; height: 650px; margin: 40px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .orbit-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        line { stroke: var(--gold); stroke-width: 1.5; opacity: 0.4; }

        .center-core {
            width: 200px; height: 200px; background: white; border: 3px solid var(--gold);
            border-radius: 12px; z-index: 20; display: flex; flex-direction: column;
            align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            padding: 20px; text-align: center;
        }

        .pillar-node {
            position: absolute; transform: translate(-50%, -50%); z-index: 30;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .p-icon {
            width: 40px; height: 40px; background: var(--navy); color: white;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 12px; box-shadow: 0 4px 10px rgba(11,31,63,0.2);
        }
        .p-label {
            background: white; color: var(--navy); font-size: 9px; font-weight: 900;
            padding: 4px 10px; border-radius: 3px; text-transform: uppercase;
            border: 1px solid var(--gold); white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* INITIALIZE BUTTON */
        .btn-launch {
            background: var(--navy); color: white; padding: 18px 45px; border-radius: 4px;
            font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
            border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 25px rgba(11,31,63,0.2);
        }
        .btn-launch:hover { background: #162e55; transform: translateY(-2px); }

        footer { padding: 60px; text-align: center; border-top: 1px solid var(--border); background: white; }
    </style>
</head>
<body class="dot-grid">

    <nav>
        <div class="logo-group">
            <div class="logo-box">
                <svg viewBox="0 0 100 100" style="width:20px; height:20px;" fill="white">
                    <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
                </svg>
            </div>
            <span class="logo-text">Merrick Compliance</span>
        </div>
        <div style="font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4;">
            A Division of Merrick Solution
        </div>
    </nav>

    <main class="hero">
        <span style="font-size: 10px; font-weight: 900; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; display: block; margin-bottom: 10px;">Proprietary System Terminal</span>
        <h1>8 Pillar Compliance Framework</h1>
        <p>Architecting structured, audit-ready onboarding infrastructure for institutional durablity.</p>

        <div class="orbit-wrapper">
            <svg class="orbit-lines" id="svg-container"></svg>
            
            <div class="center-core">
                <svg viewBox="0 0 100 100" style="width:60px; height:60px; margin-bottom: 10px;" fill="var(--navy)">
                    <rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/>
                </svg>
                <div style="font-size: 10px; font-weight: 900; color: var(--gold); letter-spacing: 3px; text-transform: uppercase;">MC™ CORE</div>
            </div>

            <div id="nodes-container"></div>
        </div>

        <div style="margin-top: 50px;">
            <button onclick="window.location.href='os.html'" class="btn-launch">Initialize Master OS Engine</button>
        </div>
    </main>

    <footer>
        <p style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; opacity: 0.3;">
            &copy; 2026 MERRICK COMPLIANCE STRATEGIC SYSTEMS | WWW.MERRICKSOLUTION.COM
        </p>
    </footer>

    <script>
        const PILLARS = [
            "Risk Taxonomy", "Customer ID (CIP)", "Diligence (EDD)", "Screen & Triage",
            "Evidence Chain", "Adjudication Logic", "Quality Assurance (QA)", "Board Reporting"
        ];

        function renderDiagram() {
            const nodesContainer = document.getElementById('nodes-container');
            const svgContainer = document.getElementById('svg-container');
            const radius = 260; // Distance from center
            const centerX = 325; // Center point of wrapper (650/2)
            const centerY = 325;

            PILLARS.forEach((title, i) => {
                // Calculate position on the circle
                const angle = (i * 45 - 90) * (Math.PI / 180);
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                // Create the Node
                nodesContainer.innerHTML += `
                    <div class="pillar-node" style="left: ${x}px; top: ${y}px;">
                        <div class="p-icon">0${i+1}</div>
                        <div class="p-label">${title}</div>
                    </div>
                `;

                // Create the connecting line
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", centerX);
                line.setAttribute("y1", centerY);
                line.setAttribute("x2", x);
                line.setAttribute("y2", y);
                svgContainer.appendChild(line);
            });
        }

        window.onload = renderDiagram;
    </script>
</body>
</html>
