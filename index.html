<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merrick Compliance | Proprietary Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3F; --gold: #F5C518; --border: #E2E8F0; }
        body { font-family: 'Inter', sans-serif; background: #FDFDFD; color: var(--navy); margin: 0; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .dot-grid { background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px); background-size: 30px 30px; }
        .hero-title { font-size: 42px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.1; text-transform: uppercase; }
        .btn-launch { 
            background: var(--navy); color: white; padding: 18px 40px; border-radius: 4px;
            font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(11,31,63,0.2);
        }
    </style>
</head>
<body class="dot-grid min-h-screen flex flex-col">
    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="bg-navy p-1 rounded-sm">
                <svg viewBox="0 0 100 100" class="w-5 h-5" fill="white"><rect x="12" y="30" width="16" height="40"/><path d="M12 30H50V40H32V70H12V30Z"/><rect x="34" y="30" width="16" height="40"/><path d="M56 42H88V50H72V58H88V66H56V42Z"/></svg>
            </div>
            <span class="font-montserrat font-black text-sm tracking-tighter uppercase">Merrick Compliance</span>
        </div>
    </nav>
    <main class="flex-1 flex flex-col items-center justify-center text-center px-6">
        <div class="max-w-2xl space-y-8">
            <h1 class="hero-title font-montserrat">Architecting <br>Audit-Ready Compliance <br>Infrastructure.</h1>
            <div class="pt-6">
                <button onclick="launchOS()" class="btn-launch">Initialize Master OS Engine</button>
            </div>
        </div>
    </main>
    <script>
        function launchOS() {
            if(prompt("ENTER SYSTEM ACCESS CODE:") === "MC8ADMIN") {
                window.location.href='os.html';
            } else { alert("ACCESS DENIED."); }
        }
    </script>
</body>
</html>
